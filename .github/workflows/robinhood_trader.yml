name: Robinhood MoC Order

on:
  schedule:
    # 12:15 PM Pacific Time, Monday through Friday
    - cron: '4 12 * * MON-FRI'
      timezone: 'America/Los_Angeles'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  run-trader:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests yfinance
          fi

      # --- STEP 1: DOWNLOAD PREVIOUS ARTIFACT FROM LATEST SUCCESSFUL RUN ---
      - name: Download Latest Encrypted Token Artifact
        uses: dawidd6/action-download-artifact@v21
        with:
          name: robinhood-session-encrypted
          name_is_regexp: false
          # Pulls artifact specifically from the last successful execution of this workflow
          workflow_conclusion: success
          if_no_artifact_found: warn

      # --- DECRYPT ARTIFACT OR INITIALIZE FROM SEEDS ---
      - name: Decrypt Token or Initialize Seed
        env:
          DECRYPT_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}
        run: |
          if [ -f robinhood_token.json.gpg ]; then
            echo "✅ Artifact found. Decrypting..."
            gpg --quiet --batch --yes --decrypt --passphrase="$DECRYPT_KEY" --output robinhood_token.json robinhood_token.json.gpg
            rm robinhood_token.json.gpg
            echo "🔓 Token decrypted successfully."
          else
            echo "⚠️ No artifact found. Initializing seed structure from repository secrets..."
            echo '{"access_token": "${{ secrets.ROBINHOOD_ACCESS_TOKEN }}", "refresh_token": "${{ secrets.ROBINHOOD_REFRESH_TOKEN }}"}' > robinhood_token.json
          fi

      # --- STEP 2: RUN TRADING ENGINE ---
      - name: Execute Strategy Loop
        env:
          ROBINHOOD_CLIENT_ID: ${{ secrets.ROBINHOOD_CLIENT_ID }}
          ROBINHOOD_ACCOUNT_NUMBER: ${{ secrets.ROBINHOOD_ACCOUNT_NUMBER }}
        run: |
          python ./robinhood_moc_strategy.py

      # --- STEP 3: ENCRYPT & UPLOAD FRESH ARTIFACT ---
      - name: Encrypt Fresh Token
        if: always()
        env:
          ENCRYPT_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}
        run: |
          if [ -f robinhood_token.json ]; then
            echo "🔒 Encrypting fresh session keys..."
            gpg --quiet --batch --yes --symmetric --cipher-algo AES256 --passphrase="$ENCRYPT_KEY" --output robinhood_token.json.gpg robinhood_token.json
            rm robinhood_token.json
          else
            echo "❌ robinhood_token.json missing. Nothing to encrypt."
          fi

      - name: Upload Fresh Token Artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: robinhood-session-encrypted
          path: robinhood_token.json.gpg
          overwrite: true