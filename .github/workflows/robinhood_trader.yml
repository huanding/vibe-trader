name: Market Close Ingestion

on:
  schedule:
    # 12:45 PM Pacific Time, Monday through Friday
    - cron: '45 12 * * 1-5'
      timezone: 'America/Los_Angeles'
  workflow_dispatch:

jobs:
  run-trader:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests yfinance
          fi

      - name: Execute Strategy Loop
        env:
          ROBINHOOD_CLIENT_ID: ${{ secrets.ROBINHOOD_CLIENT_ID }}
          ROBINHOOD_ACCOUNT_NUMBER: ${{ secrets.ROBINHOOD_ACCOUNT_NUMBER }}
          ROBINHOOD_ACCESS_TOKEN: ${{ secrets.ROBINHOOD_ACCESS_TOKEN }}
          ROBINHOOD_REFRESH_TOKEN: ${{ secrets.ROBINHOOD_REFRESH_TOKEN }}
        run: |
          python ./robinhood_moc_strategy.py